# Hand-written. The "preview" channel — `main` (ADR-0004, amended 2026-05-30).
#
# Shape:
#   - Trigger: push to `main`. `main` is the integration trunk / `-preview`
#     channel — the deliberate lane where work stabilises. Nerdbank.GitVersioning
#     produces a prerelease of the form `2026.1.0-preview.<height>.g<commit>`
#     (`main` is intentionally NOT a public-release ref in version.json), so these
#     never look like a stable release.
#   - Builds + packs, then pushes every *.nupkg to GitHub Packages ONLY.
#   - Deliberately does NOT touch nuget.org and does NOT create a GitHub Release.
#     GitHub Packages is the test/preview channel and is opt-in for consumers
#     (they add the feed), so it causes none of the nuget.org Dependabot
#     fan-out that ADR-0001 / ADR-0002 were avoiding.
#
# The faster, intentionally-unstable `-alpha` lane is `experimental` (experimental.yml).
# Stable + legacy releases are deliberate and tag-triggered — see release.yml.
# Cross-platform validation on `main` pushes is covered by macos-latest.yml /
# windows-latest.yml; this workflow's job is publishing, not gating.

name: preview

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '.assets/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  preview:
    name: preview → GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      packages: write
    environment:
      name: github-packages
      url: https://github.com/ChrisonSimtian/Fallout/packages
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0           # Nerdbank.GitVersioning needs full history
          submodules: recursive
      - name: 'Cache: .fallout/temp, ~/.nuget/packages'
        uses: actions/cache@v4
        with:
          path: |
            .fallout/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-preview-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props', 'version.json') }}
      - name: 'Setup: .NET SDK'
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: 'Restore: dotnet tools'
        run: dotnet tool restore
      - name: 'Run: Pack'
        run: dotnet fallout Pack
      - name: 'Push: all *.nupkg to GitHub Packages (preview)'
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(output/packages/*.nupkg)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "::error::No packages found — nothing to publish to the preview channel."
            exit 1
          fi
          for pkg in "${packages[@]}"; do
            echo "Pushing $pkg to GitHub Packages (preview)..."
            dotnet nuget push "$pkg" \
              --source "https://nuget.pkg.github.com/ChrisonSimtian/index.json" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate
          done
