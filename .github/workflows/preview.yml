# Hand-written. The "preview" channel тАФ `main` (ADR-0004, amended 2026-05-30).
#
# Shape:
#   - Trigger: push to `main`. `main` is the integration trunk / `-preview`
#     channel тАФ the deliberate lane where work stabilises. Nerdbank.GitVersioning
#     produces a prerelease of the form `2026.1.0-preview.<height>.g<commit>`
#     (`main` is intentionally NOT a public-release ref in version.json), so these
#     never look like a stable release.
#   - Builds + packs, then pushes every *.nupkg to GitHub Packages ONLY.
#   - Deliberately does NOT touch nuget.org and does NOT create a GitHub Release.
#     GitHub Packages is the test/preview channel and is opt-in for consumers
#     (they add the feed), so it causes none of the nuget.org Dependabot
#     fan-out that ADR-0001 / ADR-0002 were avoiding.
#
# `main` is the sole continuous prerelease lane (ADR-0008 collapsed the former
# `experimental` `-alpha` lane into `main`). Stable + legacy releases are
# deliberate and tag-triggered тАФ see release.yml.
# Cross-platform validation on `main` pushes is covered by macos-latest.yml /
# windows-latest.yml; this workflow's job is publishing, not gating.

name: preview

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '.assets/**'
      - '**/*.md'

# Cancel a superseded preview build when a newer commit lands (#322). Never on release.yml.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preview:
    name: preview тЖТ GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      packages: write
    environment:
      name: github-packages
      url: https://github.com/Fallout-build/Fallout/packages
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0           # Nerdbank.GitVersioning needs full history
      - name: 'Cache: .fallout/temp, ~/.nuget/packages'
        uses: actions/cache@v4
        with:
          path: |
            .fallout/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-preview-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props', 'version.json') }}
          restore-keys: |
            ${{ runner.os }}-preview-
      - name: 'Setup: .NET SDK'
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: 'Restore: dotnet tools'
        run: dotnet tool restore
      # Test + Pack + push preview тЖТ GitHub Packages, all through our own framework (#333) тАФ
      # dogfooding `dotnet fallout Publish` instead of a hand-rolled `dotnet nuget push`.
      # `Publish` depends on Test + Pack, so NUKE runs Restore тЖТ Compile тЖТ Test тЖТ Pack тЖТ
      # Publish as discrete internal stages and fails at the breaking stage; if Test fails
      # the job stops before any push. Which packages go where (Fallout.* + Nuke.* тЖТ GitHub
      # Packages) is decided by Build.cs IPublish.PublishTargets, not here.
      - name: 'Publish: preview тЖТ GitHub Packages'
        run: dotnet fallout Publish --publish-to github-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
